<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMF Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<!-- Try to host this on Github for now -->
<body>
    <header>
        <a href="index.html"><img src="assets/BMF white logo - SAIT YR 1.webp" alt="Benjamin Morante Fernandez Logo"></a>
        <Nav>
            <ul>
                <li>About</li>
                <li>Contact</li>
            </ul>
        </Nav>
    </header>
    <main>
        <form action="https://formsubmit.co/b.morantefernandez@gmail.com" method="post">
            <fieldset>
                <legend>Your information</legend>

                <section>
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </section>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" autocomplete="email" required>
            </fieldset>
            
            <fieldset>
                <legend>Reason for Contact:</legend>

                <input type="radio" name="reason" id="general" value="general" checked required>
                <label for="general">General Inquiry</label>

                <input type="radio" name="reason" id="tech-support" value="tech-support">
                <label for="tech-support">Technical Support</label>

                <input type="radio" name="reason" id="feedback" value="feedback">
                <label for="feedback">Feedback</label>

                <input type="radio" name="reason" id="opportunity" value="opportunity">
                <label for="opportunity">Business Opportunity</label>
           </fieldset>

           <label for="message">Message:</label>
           <textarea name="message" id="message" spellcheck="true" rows="5" cols="80"></textarea>

            <input type="hidden" name="_subject" value="[Portfolio] Someone has contacted you!">

           <button type="submit">Send</button>

        </form>
    </main>
    <footer>
        <p>Thank you for your time, have a great day!</p>
    </footer>
</body>
</html>
